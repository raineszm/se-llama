; se-llama default presets configuration
; Path: ~/snap/se-llama/common/config/presets.ini
; Consumed by: llama-server --models-preset <path>
;
; SECURITY NOTE: Do NOT add 'slot-save-path' to this file.
; Adding slot-save-path causes llama-server to write KV cache (inference data)
; to disk. The default configuration intentionally omits it to ensure zero
; on-disk inference data.
;
; HOW TO USE:
; 1. Add a section below with a Hugging Face GGUF repository
; 2. Start the server: se-llama.server
; 3. Make API requests with "model": "<section-name>" in the request body
;
; Example section name "phi3-mini" — clients use: {"model": "phi3-mini", ...}

; Global defaults applied to all presets
[*]
no-cache-prompt = true
host = 127.0.0.1
port = 8080

; GPU-accelerated example preset (Vulkan)
; Uncomment and update hf-repo to enable:
;[phi3-mini]
;hf-repo = owner/phi-3-mini-GGUF:Q4_K_M
;alias = phi3-mini
;n-gpu-layers = 99
;ctx-size = 4096

; CPU-only example preset (for machines without a Vulkan GPU)
; Uncomment and update hf-repo to enable:
;[phi3-mini-cpu]
;hf-repo = owner/phi-3-mini-GGUF:Q4_K_M
;alias = phi3-mini-cpu
;n-gpu-layers = 0
;ctx-size = 4096
