# llama.cpp snap package — se-llama
#
# Backend variants (swap the Vulkan flag for the desired backend):
#   Vulkan (default):  -DGGML_VULKAN=1
#   ROCm (AMD):        -DGGML_HIP=ON   (requires self-hosted ROCm build infra)
#   CUDA (NVIDIA):     -DGGML_CUDA=ON  (requires self-hosted CUDA build infra)
#
# To switch backends, replace the -DGGML_VULKAN=1 entry in cmake-parameters
# below with the appropriate flag for your target GPU vendor.

name: se-llama
base: core24
adopt-info: llama-cpp
summary: Privacy-first local LLM inference snap with Vulkan GPU acceleration
description: |
  se-llama packages llama.cpp (llama-server) as a strictly confined snap for
  local, single-user LLM inference on Ubuntu 24.04. Key features:

  - Vulkan GPU backend: runs on AMD, Intel, and most modern GPUs via the host
    Vulkan ICD — no proprietary vendor libraries bundled.
  - Zero on-disk inference data by default: no KV cache, no prompt cache files
    written to disk.
  - presets.ini model management: define named model configurations in
    ~/snap/se-llama/common/config/presets.ini; clients select models per-request
    via the OpenAI-compatible "model" field.

grade: devel
confinement: strict

apps:
  server:
    command: bin/run-server
    extensions:
      - gpu
    plugs:
      - network
      - network-bind
      - opengl

  update-models:
    command: bin/update-models
    plugs:
      - home

parts:
  llama-cpp:
    plugin: cmake
    source: https://github.com/ggml-org/llama.cpp
    source-type: git
    cmake-generator: Ninja
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DBUILD_SHARED_LIBS=OFF
      - -DGGML_VULKAN=ON
      - -DLLAMA_BUILD_SERVER=ON
    build-packages:
      - cmake
      - ninja-build
      - libvulkan-dev
      - glslc
      - spirv-headers
      - g++
      - pkg-config
      - libssl-dev
    stage-packages:
      - libgomp1
      - libvulkan1
      - libglu1-mesa
      - libssl3
    prime:
      - usr/bin/llama-server
      - usr/lib/*/libgomp.so*
      - usr/lib/*/libvulkan.so*
      - usr/lib/*/libssl.so*
      - usr/lib/*/libcrypto.so*
    override-pull: |
      craftctl default
      # Set snap version to upstream git tag for automatic version tracking
      VERSION="$(git describe --tags --abbrev=0 2>/dev/null || git rev-parse --short HEAD)"
      craftctl set version="${VERSION}"

  curl:
    plugin: nil
    stage-packages:
      - curl

  local-files:
    plugin: dump
    source: snap/local/
    organize:
      bin/run-server: bin/run-server
      bin/update-models: bin/update-models
      libexec/update_models.py: libexec/update_models.py
      etc/se-llama/presets.ini: etc/se-llama/presets.ini

  update-models-runtime:
    plugin: nil
    stage-packages:
      - python3
